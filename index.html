<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <title>pra ti 💚</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #a8e6cf, #3d8168);
      color: #1b4332;
    }

    .container {
      text-align: center;
      background: #f0f7f4;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    input {
      padding: 0.5rem;
      font-size: 16px;
      border: 2px solid #3d8168;
      border-radius: 8px;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1.5rem;
      background-color: #3d8168;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .error {
      color: #e63946;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Quem é você? 💚</h1>
  <input id="nameInput" type="text" placeholder="Seu nome..." />
  <br />
  <button id="enterButton">Entrar</button>
  <p class="error" id="errorMessage">Digite um nome válido 😅</p>
</div>

<script>
let userChoices = {
  name: "",
  activity: "",
  place: "",
  date: "",
  time: "",
};

const activityMap = {
  casual: "🍕 Barzinho",
  dinner: "🍽️ Jantar",
  lunch: "🍔 Almoço",
  park: "🌳 Parque",
  cafe: "☕ Café"
};

function startValentinesInvite() {
  Swal.fire({
    title: "EBA, É você! 💖",
    text: `Oi ${userChoices.name}, gostaria de sair comigo? :>`,
    imageUrl: "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
    imageWidth: 200,
    showDenyButton: true,
    showCancelButton: true,
    confirmButtonText: "Sim! 💘",
    denyButtonText: "Não 😢",
    cancelButtonText: "Talvez 🤔",
  }).then((result) => {
    if (result.isConfirmed) {
      askPreferences();
    } else if (result.isDenied) {
      Swal.fire("Poxa 😢", "Mas tudo bem, te desejo um ótimo dia 💚");
    } else {
      Swal.fire("Sem pressa 😌", "Quando quiser, me chama 💚");
    }
  });
}

function askPreferences() {
  Swal.fire({
    title: "Perfeito! 💞",
    text: "O que você gostaria de fazer?",
    input: "select",
    inputOptions: activityMap,
    inputPlaceholder: "Escolha algo",
    showCancelButton: true,
  }).then((result) => {
    if (!result.value) return cancelFlow();

    userChoices.activity = result.value;
    askPlace();
  });
}

function askPlace() {
  Swal.fire({
    title: "Boa escolha 😏",
    text: "Onde você gostaria de ir?",
    input: "text",
    inputPlaceholder: "Ex: um lugar especial...",
    showCancelButton: true,
  }).then((result) => {
    if (!result.value) return cancelFlow();

    userChoices.place = result.value;
    askDate();
  });
}

function askDate() {
  Swal.fire({
    title: "Escolha a data 📅",
    input: "date",
    showCancelButton: true,
  }).then((result) => {
    if (!result.value) return cancelFlow();

    userChoices.date = result.value;
    askTime();
  });
}

function askTime() {
  Swal.fire({
    title: "Agora o horário ⏰",
    input: "select",
    inputOptions: {
      morning: "🌅 Manhã",
      afternoon: "🌞 Tarde",
      evening: "🌙 Noite",
    },
    inputPlaceholder: "Selecione",
    showCancelButton: true,
  }).then((result) => {
    if (!result.value) return cancelFlow();

    userChoices.time = result.value;
    showSummary();
  });
}

function showSummary() {
  const timeMap = {
    morning: "Manhã 🌅",
    afternoon: "Tarde 🌞",
    evening: "Noite 🌙",
  };

  const formattedDate = new Date(userChoices.date)
    .toLocaleDateString("pt-BR");

  Swal.fire({
    title: "Temos um encontro! 🎉",
    html: `
      <p><b>Nome:</b> ${userChoices.name}</p>
      <p><b>Atividade:</b> ${activityMap[userChoices.activity]}</p>
      <p><b>Local:</b> ${userChoices.place}</p>
      <p><b>Data:</b> ${formattedDate}</p>
      <p><b>Hora:</b> ${timeMap[userChoices.time]}</p>
    `,
    icon: "success",
    confirmButtonText: "Mal posso esperar 💘",
  });

  // envio
  fetch("https://script.google.com/macros/s/AKfycbzZw3wW3D4ea7V-D7egk-fpukvytt03sHLGsw7nQap0HiHmCPuagr2zgivsNdFAnCqQ/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(userChoices),
  })
  .then(() => console.log("✅ Enviado"))
  .catch(() => console.log("❌ Erro ao enviar"));
}

function cancelFlow() {
  Swal.fire("Tudo bem 😅", "A gente tenta outro dia!", "info");
}

// botão inicial
const enterButton = document.getElementById("enterButton");
const nameInput = document.getElementById("nameInput");
const errorMessage = document.getElementById("errorMessage");

enterButton.addEventListener("click", () => {
  const name = nameInput.value.trim();

  if (name.length < 2) {
    errorMessage.style.display = "block";
    return;
  }

  userChoices.name = name;
  errorMessage.style.display = "none";
  startValentinesInvite();
});
</script>

</body>
</html>
